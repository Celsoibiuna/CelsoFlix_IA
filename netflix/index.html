<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-carousel" aria-hidden="true">
        <div class="slide slide-1"></div>
        <div class="slide slide-2"></div>
        <div class="slide slide-3"></div>
        <div class="slide slide-4"></div>
    </div>
    <main>
        <header>
            <h1>Escolha seu perfil</h1>
            <button id="theme-toggle" type="button" aria-label="Alternar tema"></button>
        </header>
        <section class="profiles">
            <ul>
                <li>
                    <ol>
                        <li>
                            <a href="catalogo/catalogo.html" data-name="Celso" data-img="perfil-2.jpg">
                                <article class="profile">
                                    <img src="imagens/perfil-2.jpg" alt="personagem vitoriano excêntrico e pálido, com um monóculo e cartola de engrenagens, imerso num cenário sombrio e gótico de relógios e prédios antigos.">
                                    <p>Celso</p>
                                </article>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" data-name="Tiago" data-img="tiago.jpg">
                                <article class="profile">
                                    <img src="imagens/tiago.jpg" alt="escritório doméstico à noite, com uma caneca de café, um caderno e um boné de veludo cotelê com o logo URBAN PEAK sobre uma mesa de madeira.">
                                    <p>Tiago</p>
                                </article>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" data-name="Arielly" data-img="arielly.png">
                                <article class="profile">
                                    <img src="imagens/arielly.png" alt="menina morena cabelos longos cacheados, vestida de princesa com vestido rosa, com fundo estilo Disney castelo encantado">
                                    <p>Arielly</p>
                                </article>
                            </a>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
